<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #1a1e24;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .title {
    font-family: 'Playfair Display', serif;
    font-size: 96px;
    font-weight: 700;
    letter-spacing: -2px;
  }
  .title .white { color: #ffffff; }
  .title .orange { color: #ff6b35; }
  .subtitle {
    font-family: 'Inter', sans-serif;
    font-size: 32px;
    color: #9ca3af;
    margin-top: 16px;
    letter-spacing: 3px;
  }
  .url {
    position: absolute;
    bottom: 40px;
    font-family: 'Inter', sans-serif;
    font-size: 20px;
    color: #6b7280;
  }
</style>
</head>
<body>
  <div class="title"><span class="white">tecto</span><span class="orange">vox</span></div>
  <div class="subtitle">Tech. Media. AI. Ideas.</div>
  <div class="url">tectovox.com</div>
</body>
</html>
