<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #1a1e24;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    overflow: hidden;
  }
  .title {
    font-size: 96px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: -2px;
  }
  .subtitle {
    font-size: 32px;
    color: #ff6b35;
    margin-top: 16px;
    font-weight: 700;
    letter-spacing: 4px;
  }
  .url {
    position: absolute;
    bottom: 40px;
    font-family: sans-serif;
    font-size: 16px;
    color: #6b7280;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
  <div class="title">tectovox</div>
  <div class="subtitle">Tech. Media. AI. Ideas.</div>
  <div class="url">tectovox.com</div>
</body>
</html>
